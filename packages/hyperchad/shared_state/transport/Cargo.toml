[package]
authors     = { workspace = true }
categories  = ["development-tools", "network-programming", "web-programming"]
description = "HyperChad shared state transport abstractions"
edition     = { workspace = true }
keywords    = ["hyperchad", "realtime", "state", "transport"]
license     = { workspace = true }
name        = "hyperchad_shared_state_transport"
readme      = "README.md"
repository  = { workspace = true }
version     = "0.1.0"

[package.metadata]
examples = false

[package.metadata.workspaces]
group = "hyperchad"

[dependencies]
hyperchad_shared_state_models = { workspace = true }
moosicbox_assert              = { workspace = true }

async-trait = { workspace = true }
flume = { workspace = true }
futures-util = { workspace = true, optional = true }
http = { workspace = true, optional = true }
log = { workspace = true }
reqwest = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
thiserror = { workspace = true }
tokio = { workspace = true, optional = true, features = [
    "macros",
    "rt",
    "sync",
] }
tokio-tungstenite = { workspace = true, optional = true }

[features]
default = []

adapter-sse-post-json = [
    "dep:futures-util",
    "dep:reqwest",
    "dep:serde_json",
    "dep:tokio",
]
adapter-ws-json = [
    "dep:futures-util",
    "dep:http",
    "dep:serde_json",
    "dep:tokio",
    "dep:tokio-tungstenite",
]

fail-on-warnings = [
    "hyperchad_shared_state_models/fail-on-warnings",
    "moosicbox_assert/fail-on-warnings",
]
