[package]
authors     = { workspace = true }
categories  = ["development-tools", "network-programming", "web-programming"]
description = "HyperChad shared state protocol models"
edition     = { workspace = true }
keywords    = ["hyperchad", "realtime", "state", "sync"]
license     = { workspace = true }
name        = "hyperchad_shared_state_models"
readme      = "README.md"
repository  = { workspace = true }
version     = "0.1.0"

[package.metadata]
examples = false

[package.metadata.workspaces]
group = "hyperchad"

[dependencies]
moosicbox_assert = { workspace = true }

base64    = { workspace = true }
bincode   = { workspace = true, features = ["serde", "std"] }
serde     = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }

[features]
default = []

fail-on-warnings = ["moosicbox_assert/fail-on-warnings"]
