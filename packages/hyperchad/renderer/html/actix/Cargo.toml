[package]
authors     = { workspace = true }
categories  = ["gui"]
description = "HyperChad HTML Actix renderer package"
edition     = { workspace = true }
keywords    = ["gui", "html", "render", "renderer", "web"]
license     = { workspace = true }
name        = "hyperchad_renderer_html_actix"
readme      = "README.md"
repository  = { workspace = true }
version     = "0.1.4"

[package.metadata]
examples = false

[package.metadata.workspaces]
group = "hyperchad"

[dependencies]
actix-ws                      = { workspace = true, optional = true }
hyperchad_renderer            = { workspace = true, features = ["canvas"] }
hyperchad_router              = { workspace = true, optional = true }
hyperchad_shared_state_bridge = { workspace = true, optional = true }
hyperchad_shared_state_models = { workspace = true, optional = true }
moosicbox_assert              = { workspace = true }
moosicbox_env_utils           = { workspace = true }
moosicbox_logging             = { workspace = true }
moosicbox_middleware          = { workspace = true }

actix-cors          = { workspace = true }
actix-files         = { workspace = true, optional = true }
actix-web           = { workspace = true }
async-trait         = { workspace = true }
bytes               = { workspace = true }
flate2              = { workspace = true }
flume               = { workspace = true }
futures-util        = { workspace = true }
log                 = { workspace = true }
qstring             = { workspace = true, optional = true }
serde               = { workspace = true, optional = true }
serde_json          = { workspace = true, optional = true }
switchy_http_models = { workspace = true, optional = true }

[dev-dependencies]
test-log = { workspace = true }

[features]
default = ["actions", "assets", "debug", "sse"]

fail-on-warnings = [
    "hyperchad_renderer/fail-on-warnings",
    "hyperchad_router?/fail-on-warnings",
    "hyperchad_shared_state_bridge?/fail-on-warnings",
    "hyperchad_shared_state_models?/fail-on-warnings",
    "moosicbox_assert/fail-on-warnings",
    "moosicbox_env_utils/fail-on-warnings",
    "moosicbox_logging/fail-on-warnings",
    "moosicbox_middleware/fail-on-warnings",
]

debug = []

assets = ["dep:actix-files", "hyperchad_renderer/assets"]

actions = ["dep:serde", "dep:serde_json", "hyperchad_renderer/logic"]
shared-state-bridge = [
    "actions",
    "dep:hyperchad_router",
    "dep:hyperchad_shared_state_bridge",
    "dep:hyperchad_shared_state_models",
    "dep:qstring",
    "dep:switchy_http_models",
]
shared-state-transport = [
    "dep:actix-ws",
    "dep:hyperchad_shared_state_models",
    "dep:serde_json",
]
sse = ["dep:serde_json", "hyperchad_renderer/serde"]
