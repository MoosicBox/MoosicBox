[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "MoosicBox clippier package"
edition     = { workspace = true }
keywords    = ["clippier", "util", "utilities", "utils"]
license     = { workspace = true }
name        = "clippier"
readme      = "README.md"
repository  = { workspace = true }
version     = "0.1.1"

[package.metadata]
examples = true
tests    = false

[package.metadata.workspaces]
independent = true

[package.metadata.cargo-machete]
ignored-dirs = ["test-resources", "tests/transforms/fixtures"]

[[bin]]
name              = "clippier"
path              = "src/main.rs"
required-features = []

[dependencies]
moosicbox_log_runtime = { workspace = true, features = ["env-filter", "file", "layer-ext", "log-compat"] }
switchy_async = { workspace = true, features = [
    "macros",
    "process",
    "sync",
    "tokio",
] }
switchy_fs = { workspace = true, features = [
    "async",
    "simulator-real-fs",
    "std",
    "sync",
    "tokio",
] }
switchy_random = { workspace = true, features = ["rand"] }

anyhow      = { workspace = true }
async-trait = { workspace = true }
chrono      = { workspace = true }
clap        = { workspace = true }
ctrlc       = { workspace = true, optional = true }
globset     = { workspace = true }
itertools   = { workspace = true }
log         = { workspace = true }
ratatui     = { workspace = true, optional = true }
rayon       = { workspace = true, optional = true }
regex       = { workspace = true }
serde       = { workspace = true }
serde_json  = { workspace = true }
serde_yaml  = { workspace = true, optional = true }
thiserror   = { workspace = true }
toml        = { workspace = true }
which       = { workspace = true, optional = true, features = ["real-sys"] }

git2 = { workspace = true, optional = true }
mlua = { workspace = true, optional = true, features = ["lua54", "serialize"] }

[dev-dependencies]
clippier_test_utilities = { workspace = true, features = ["git-diff"] }
insta                   = { workspace = true, features = ["json", "redactions", "yaml"] }
test-log                = { workspace = true }

[features]
default = [
    "cargo-workspace",
    "check",
    "format",
    "git-diff",
    "node-workspace",
    "tools-tui",
    "transforms-vendored",
]

fail-on-warnings = [
    "moosicbox_log_runtime/fail-on-warnings",
    "switchy_async/fail-on-warnings",
    "switchy_fs/fail-on-warnings",
    "switchy_random/fail-on-warnings",
]

# Workspace type support
_workspace      = []
cargo-workspace = ["_workspace"]
node-workspace  = ["_workspace", "dep:serde_yaml"]

_tools              = ["dep:rayon", "dep:which"]
_transforms         = []
check               = ["_tools"]
format              = ["_tools"]
git-diff            = ["dep:git2"]
test-utils          = ["switchy_fs/simulator-real-fs"]
tools-tui           = ["_tools", "dep:ctrlc", "dep:ratatui"]
transforms-system   = ["_transforms", "dep:mlua"]
transforms-vendored = ["_transforms", "mlua/vendored"]

# Automatically enable test-utils when running tests
[[test]]
name              = "integration_test"
required-features = ["git-diff", "test-utils"]

[[test]]
name              = "external_deps_test"
required-features = ["git-diff", "test-utils"]

[[test]]
name              = "real_world_test"
required-features = ["git-diff", "test-utils"]

[[test]]
name              = "feature_validator_integration"
required-features = ["test-utils"]

[[test]]
name              = "transforms_tests"
required-features = ["_transforms"]
