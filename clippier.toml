# Workspace-level clippier configuration
# This defines common toolchains and dependencies for workspace-level CI setup

# Common toolchains needed for full workspace CI
[[dependencies]]
toolchain = "cargo-machete"

[[dependencies]]
toolchain = "taplo"

[tools]
skip = ["gofmt"]

[tools.clippier-md]
line-width = 999999

[tools.clippier-md.prose]
wrap = "preserve"

[tools.clippier-md.list]
indentation = "preserve"

[tools.clippier-md.headings]
indentation = "preserve"

[tools.clippier-md.files]
exclude = ["packages/opus_native/libopus/**"]
