name: OpenCode Auth Refresh

on:
    workflow_call:
        outputs:
            auth_artifact_name:
                description: "Encrypted auth artifact name for downstream jobs"
                value: ${{ jobs.refresh.outputs.auth_artifact_name }}
        secrets:
            OPENCODE_AUTH_JSON_B64:
                required: true
            OPENCODE_SECRETS_PAT:
                required: true
            OPENCODE_ARTIFACT_KEY:
                required: true

jobs:
    refresh:
        runs-on: ubuntu-latest
        outputs:
            auth_artifact_name: ${{ steps.encrypt.outputs.auth_artifact_name }}
        concurrency:
            group: opencode-auth-refresh-${{ github.repository }}
            cancel-in-progress: false
        permissions:
            contents: read
        steps:
            - name: Validate environment and restore auth state
              id: restore
              shell: bash
              env:
                  OPENCODE_AUTH_JSON_B64: ${{ secrets.OPENCODE_AUTH_JSON_B64 }}
              run: |
                  set -euo pipefail

                  if [ -n "${OPENAI_API_KEY:-}" ]; then
                    echo "❌ OPENAI_API_KEY must not be set for subscription-auth workflows"
                    exit 1
                  fi

                  if [ -z "${OPENCODE_AUTH_JSON_B64:-}" ]; then
                    echo "❌ Missing OPENCODE_AUTH_JSON_B64 secret"
                    exit 1
                  fi

                  AUTH_DIR="$HOME/.local/share/opencode"
                  AUTH_FILE="$AUTH_DIR/auth.json"
                  mkdir -p "$AUTH_DIR"

                  CLEAN_AUTH_JSON_B64="$(printf '%s' "$OPENCODE_AUTH_JSON_B64" | tr -d '[:space:]')"
                  if [ -z "$CLEAN_AUTH_JSON_B64" ]; then
                    echo "❌ OPENCODE_AUTH_JSON_B64 is empty after whitespace normalization"
                    exit 1
                  fi

                  CLEAN_AUTH_JSON_B64="$CLEAN_AUTH_JSON_B64" python3 - "$AUTH_FILE" << 'PY'
                  import base64
                  import binascii
                  import os
                  import pathlib
                  import sys

                  value = os.environ["CLEAN_AUTH_JSON_B64"]
                  try:
                      decoded = base64.b64decode(value, validate=True)
                  except binascii.Error as exc:
                      raise SystemExit(f"❌ Invalid OPENCODE_AUTH_JSON_B64 secret: {exc}")

                  pathlib.Path(sys.argv[1]).write_bytes(decoded)
                  PY

                  chmod 600 "$AUTH_FILE"

                  echo "auth_file=$AUTH_FILE" >> "$GITHUB_OUTPUT"
                  echo "before_hash=$(sha256sum "$AUTH_FILE" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

            - name: Checkout repository for auth scripts
              uses: actions/checkout@v6
              with:
                  fetch-depth: 1

            - name: Lightweight token validity check
              id: lightweight
              shell: bash
              run: |
                  set -euo pipefail
                  AUTH_FILE="${{ steps.restore.outputs.auth_file }}"
                  while IFS='=' read -r key value; do
                    echo "$key=$value" >> "$GITHUB_OUTPUT"
                  done < <(python3 .github/scripts/opencode-auth-validate.py "$AUTH_FILE")

            - name: Install OpenCode
              if: steps.lightweight.outputs.needs_refresh == 'true'
              uses: ./.github/actions/opencode-install
              with:
                  github_token: ${{ secrets.OPENCODE_SECRETS_PAT }}

            - name: Attempt OpenCode refresh
              if: steps.lightweight.outputs.needs_refresh == 'true'
              shell: bash
              run: |
                  set -euo pipefail
                  "$HOME/.opencode/bin/opencode" auth list >/tmp/opencode-auth-list.txt
                  "$HOME/.opencode/bin/opencode" run --model openai/gpt-5-nano "Reply with OK." >/tmp/opencode-refresh.txt 2>/tmp/opencode-refresh.err || true

            - name: Re-check token validity after refresh attempt
              if: steps.lightweight.outputs.needs_refresh == 'true'
              id: post_refresh
              shell: bash
              run: |
                  set -euo pipefail
                  AUTH_FILE="${{ steps.restore.outputs.auth_file }}"
                  while IFS='=' read -r key value; do
                    echo "post_${key}=$value" >> "$GITHUB_OUTPUT"
                  done < <(python3 .github/scripts/opencode-auth-validate.py "$AUTH_FILE")

            - name: Rotate OPENCODE_AUTH_JSON_B64 if auth changed
              if: steps.lightweight.outputs.needs_refresh == 'true'
              shell: bash
              env:
                  GH_TOKEN: ${{ secrets.OPENCODE_SECRETS_PAT }}
              run: |
                  set -euo pipefail
                  AUTH_FILE="${{ steps.restore.outputs.auth_file }}"
                  BEFORE_HASH="${{ steps.restore.outputs.before_hash }}"
                  AFTER_HASH="$(sha256sum "$AUTH_FILE" | awk '{print $1}')"

                  if [ "$BEFORE_HASH" = "$AFTER_HASH" ]; then
                    echo "ℹ️ Auth state unchanged"
                    exit 0
                  fi

                  if [ "${{ steps.post_refresh.outputs.post_valid }}" != "true" ]; then
                    echo "ℹ️ Auth changed but post-refresh validity check failed; skipping secret rotation"
                    exit 0
                  fi

                  NEW_AUTH_B64="$(base64 < "$AUTH_FILE" | tr -d '\n')"
                  printf '%s' "$NEW_AUTH_B64" | gh secret set OPENCODE_AUTH_JSON_B64 --repo "$GITHUB_REPOSITORY"
                  echo "✅ Rotated OPENCODE_AUTH_JSON_B64 secret"

            - name: Fail if auth is still invalid
              if: |
                  steps.lightweight.outputs.valid != 'true' &&
                  (steps.lightweight.outputs.needs_refresh != 'true' || steps.post_refresh.outputs.post_valid != 'true')
              shell: bash
              run: |
                  set -euo pipefail
                  echo "❌ OpenCode OpenAI subscription auth is invalid and could not be refreshed automatically."
                  echo "   Re-seed OPENCODE_AUTH_JSON_B64 using the reauth workflow_dispatch flow."
                  echo "   Initial reason: ${{ steps.lightweight.outputs.reason }}"
                  if [ "${{ steps.lightweight.outputs.needs_refresh }}" = "true" ]; then
                    echo "   Post-refresh reason: ${{ steps.post_refresh.outputs.post_reason }}"
                  fi
                  exit 1

            - name: Encrypt auth for downstream jobs
              id: encrypt
              if: success()
              shell: bash
              env:
                  OPENCODE_ARTIFACT_KEY: ${{ secrets.OPENCODE_ARTIFACT_KEY }}
              run: |
                  set -euo pipefail
                  AUTH_FILE="${{ steps.restore.outputs.auth_file }}"
                  ARTIFACT_DIR="/tmp/opencode-auth-artifact"
                  ARTIFACT_NAME="opencode-auth-${{ github.run_id }}-${{ github.run_attempt }}"

                  mkdir -p "$ARTIFACT_DIR"
                  gpg --batch --yes --symmetric --cipher-algo AES256 --passphrase "$OPENCODE_ARTIFACT_KEY" --output "$ARTIFACT_DIR/auth.json.gpg" "$AUTH_FILE"

                  echo "auth_artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"

            - name: Upload encrypted auth artifact
              if: success()
              uses: actions/upload-artifact@v6
              with:
                  name: ${{ steps.encrypt.outputs.auth_artifact_name }}
                  path: /tmp/opencode-auth-artifact/auth.json.gpg
                  retention-days: 1
