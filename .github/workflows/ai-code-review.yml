name: MoosicBox Bot Code Review

on:
    pull_request:
        types: [opened, synchronize]
        # Optional: Only run on specific file changes
        # paths:
        #   - "src/**/*.ts"
        #   - "src/**/*.tsx"
        #   - "src/**/*.js"
        #   - "src/**/*.jsx"

jobs:
    auth-refresh:
        uses: ./.github/workflows/opencode-auth-refresh.yml
        secrets:
            OPENCODE_AUTH_JSON_B64: ${{ secrets.OPENCODE_AUTH_JSON_B64 }}
            OPENCODE_SECRETS_PAT: ${{ secrets.OPENCODE_SECRETS_PAT }}
            OPENCODE_ARTIFACT_KEY: ${{ secrets.OPENCODE_ARTIFACT_KEY }}

    ai-review:
        needs: [auth-refresh]
        # Optional: Filter by PR author
        # if: |
        #   github.event.pull_request.user.login == 'external-contributor' ||
        #   github.event.pull_request.user.login == 'new-developer' ||
        #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: read
            issues: read
            id-token: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 1

            - name: Check organization membership
              env:
                  GH_TOKEN: ${{ secrets.MOOSICBOX_BOT_UPGRADES_TOKEN }}
              run: |
                  ACTOR="${{ github.event.pull_request.user.login }}"

                  echo "Checking if $ACTOR is an organization member..."

                  if gh api "/orgs/${{ github.repository_owner }}/members/$ACTOR" --silent 2>/dev/null; then
                    echo "✅ $ACTOR is an organization member"
                  else
                    echo "❌ $ACTOR is NOT an organization member - terminating workflow"

                    cat > /tmp/denied.txt << 'EOF'
                  🚫 **Automated Code Review Unavailable**

                  Automated MoosicBox bot code reviews are only available for pull requests from organization members.
                  EOF

                    gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body-file /tmp/denied.txt
                    exit 1
                  fi

            - name: Download encrypted OpenCode auth
              uses: actions/download-artifact@v4
              with:
                  name: ${{ needs.auth-refresh.outputs.auth_artifact_name }}
                  path: /tmp/opencode-auth

            - name: Decrypt OpenCode auth
              shell: bash
              env:
                  OPENCODE_ARTIFACT_KEY: ${{ secrets.OPENCODE_ARTIFACT_KEY }}
              run: |
                  set -euo pipefail

                  if [ -n "${OPENAI_API_KEY:-}" ]; then
                    echo "❌ OPENAI_API_KEY must not be set for subscription-auth workflows"
                    exit 1
                  fi

                  AUTH_DIR="$HOME/.local/share/opencode"
                  mkdir -p "$AUTH_DIR"
                  gpg --batch --yes --passphrase "$OPENCODE_ARTIFACT_KEY" --decrypt --output "$AUTH_DIR/auth.json" /tmp/opencode-auth/auth.json.gpg
                  chmod 600 "$AUTH_DIR/auth.json"

            - name: Run MoosicBox Bot Review
              id: ai-review
              uses: anomalyco/opencode/github@latest
              env:
                  GITHUB_TOKEN: ${{ secrets.MOOSICBOX_BOT_UPGRADES_TOKEN }}
              with:
                  model: openai/gpt-5.3-codex
                  use_github_token: "true"
                  prompt: |
                      REPO: ${{ github.repository }}
                      PR NUMBER: ${{ github.event.pull_request.number }}

                      Please review this pull request and provide feedback on:
                      - Code quality and best practices
                      - Potential bugs or issues
                      - Performance considerations
                      - Security concerns
                      - Test coverage

                      Use the repository's AGENTS.md for guidance on style and conventions. Be constructive and helpful in your feedback.

                      Use `gh pr comment` with your Bash tool to leave your review as a comment on the PR.
