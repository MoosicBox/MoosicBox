name: Bloaty

on:
    # push:
    #     branches: ['master']
    #     paths:
    #         - packages/**
    #         - '**/*.toml'
    #         - '**/Cargo.lock'
    #         - .github/workflows/bloaty.yml
    #         - '!packages/marketing_site/*.ts'
    #         - '!packages/marketing_site/*.json'
    #         - '!packages/marketing_site/pnpm-lock.yaml'
    #         - '!packages/marketing_site/*.mjs'
    #         - '!packages/marketing_site/*.js'
    #         - '!packages/marketing_site/*.md'
    #         - '!packages/marketing_site/.prettierignore'
    #         - '!packages/marketing_site/hyperchad/**'
    #         - '!packages/marketing_site/infra/**'
    #         - '!packages/hyperchad/renderer/vanilla_js/web/**'
    #         - '!**/*.nix'
    #         - '!**/Dockerfile'
    #         - '!**/*.Dockerfile'
    #         - '!**/*.dockerignore'
    workflow_dispatch:

env:
    CARGO_TERM_COLOR: always

jobs:
    build-matrix:
        name: Build matrix
        strategy:
            fail-fast: true
            matrix:
                os: ["ubuntu-latest"]
        runs-on: ${{ matrix.os }}
        outputs:
            matrix: ${{ steps.build-matrix-step.outputs.matrix }}
        steps:
            - uses: dtolnay/rust-toolchain@stable

            - name: Checkout
              if: ${{ matrix.os == 'ubuntu-latest' }}
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Build matrix JSON
              if: ${{ matrix.os == 'ubuntu-latest' }}
              id: build-matrix-step
              uses: ./.github/actions/clippier
              with:
                  command: features
                  transform-name-regex: "^(moosicbox|switchy|hyperchad)_"

    bloaty:
        runs-on: ${{ matrix.package.os }}
        needs: build-matrix
        strategy:
            fail-fast: false
            matrix:
                package: ${{ fromJson(needs.build-matrix.outputs.matrix) }}
        steps:
            - uses: actions/checkout@v6

            - name: Setup CI environment
              uses: ./.github/actions/clippier
              with:
                  command: setup
                  package-json: ${{ toJson(matrix.package) }}
                  skip-checkout: "true"
                  rust-components: "rustfmt, clippy, llvm-tools-preview"

            - name: Install cargo-bloat
              run: cargo install cargo-bloat

            - name: Install cargo-binutils
              run: cargo install cargo-binutils

            - name: Run bloaty ${{ matrix.package.name }}
              shell: bash
              run: |
                  ${{ matrix.package.env }} cargo run -p bloaty -- \
                        --skip-features fail-on-warnings,default \
                        --skip-feature-pattern '_.+' \
                        --output-format all \
                        --report-file report

            - name: Upload reports
              uses: actions/upload-artifact@v6
              if: always()
              with:
                  name: reports
                  path: report.*
                  if-no-files-found: warn
                  retention-days: 90
